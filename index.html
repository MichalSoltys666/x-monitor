<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Monitor | Piráti</title>
    <!-- Stabilní Tailwind v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pirate-dark': '#0f172a',
                        'pirate-card': '#1e293b',
                        'pirate-cyan': '#06b6d4',
                        'pirate-yellow': '#eab308'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-pirate-dark text-slate-100 min-h-screen font-sans antialiased">

    <!-- Header -->
    <header class="bg-pirate-card/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-50 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🏴‍☠️</span>
                <span class="font-bold text-lg text-white tracking-tight">X-Monitor</span>
            </div>
            
            <div class="flex items-center gap-4">
                <!-- ODKAZ NA ÚPRAVU -->
                <a href="https://github.com/MichalSoltys666/x-monitor/edit/main/nastaveni.json" 
                   target="_blank" 
                   class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold px-3 py-1.5 rounded-lg border border-slate-700 transition-colors inline-flex items-center gap-1.5 cursor-pointer">
                    ⚙️ Upravit sledování
                </a>
                
                <div class="text-xs text-slate-400 flex items-center gap-1.5" id="last-update-container">
                    <span class="h-2 w-2 rounded-full bg-emerald-500"></span>
                    <span>Aktualizováno: <strong id="last-run-time" class="text-slate-200">-</strong></span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-6">
        <div class="flex flex-wrap gap-6 mb-6 pb-6 border-b border-slate-800/60">
            <div>
                <span class="text-xs text-slate-400 block uppercase tracking-wider font-semibold">Celkem zmínek</span>
                <span class="text-2xl font-bold text-white" id="stat-total">0</span>
            </div>
            <div class="border-l border-slate-800 pl-6">
                <span class="text-xs text-slate-400 block uppercase tracking-wider font-semibold">Nové za 24 hodin</span>
                <span class="text-2xl font-bold text-pirate-cyan" id="stat-new">0</span>
            </div>
        </div>

        <div class="mb-6">
            <span class="text-xs text-slate-400 block mb-2 font-medium">Filtrovat podle tématu:</span>
            <div id="filter-container" class="flex flex-wrap gap-2">
                <button onclick="filterTweets('all')" id="btn-filter-all" class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-pirate-cyan text-slate-950 transition-colors cursor-pointer">
                    Všechny zmínky
                </button>
            </div>
        </div>

        <div class="space-y-2" id="tweets-container">
            <div class="text-center py-12 text-slate-500">
                <p>Zatím žádná data. Čekám na první proběhnutí robota...</p>
            </div>
        </div>
    </main>

    <script>
        let allTweets = [];
        let activeFilter = 'all';

        function getRelativeTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHours / 24);

            if (diffMins < 1) return 'před chvílí';
            if (diffMins < 60) return `před ${diffMins} min`;
            if (diffHours < 24) return `před ${diffHours} h`;
            return `před ${diffDays} d (${date.toLocaleDateString('cs-CZ')})`;
        }

        function copyToClipboard(text, buttonId) {
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById(buttonId);
                const originalText = btn.innerHTML;
                btn.innerHTML = "✓ Zkopírováno";
                btn.classList.add("text-emerald-400");
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove("text-emerald-400");
                }, 2000);
            });
        }

        async function loadData() {
            try {
                const response = await fetch(`data.json?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('Zatím neexistuje data.json');
                allTweets = await response.json();

                allTweets.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                document.getElementById('stat-total').innerText = allTweets.length;
                
                const twentyFourHoursAgo = new Date(new Date().getTime() - (24 * 60 * 60 * 1000));
                const newCount = allTweets.filter(t => new Date(t.timestamp) >= twentyFourHoursAgo).length;
                document.getElementById('stat-new').innerText = newCount;

                if (allTweets.length > 0) {
                    document.getElementById('last-run-time').innerText = new Date(allTweets[0].timestamp).toLocaleTimeString('cs-CZ', {hour: '2-digit', minute:'2-digit'});
                }

                const keywords = [...new Set(allTweets.map(t => t.matched_keyword).filter(Boolean))];
                const filterContainer = document.getElementById('filter-container');
                
                const allBtn = document.getElementById('btn-filter-all');
                filterContainer.innerHTML = '';
                filterContainer.appendChild(allBtn);

                keywords.forEach(kw => {
                    const btn = document.createElement('button');
                    btn.id = `btn-filter-${kw}`;
                    btn.className = "px-3 py-1.5 text-xs font-medium rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-700 hover:text-white transition-colors cursor-pointer";
                    btn.innerText = kw;
                    btn.onclick = () => filterTweets(kw);
                    filterContainer.appendChild(btn);
                });

                renderTweets();

            } catch (error) {
                console.log("Čekám na data.json...");
            }
        }

        function filterTweets(keyword) {
            activeFilter = keyword;
            
            const buttons = document.querySelectorAll('#filter-container button');
            buttons.forEach(btn => {
                btn.className = "px-3 py-1.5 text-xs font-medium rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-700 hover:text-white transition-colors cursor-pointer";
            });

            const activeBtn = document.getElementById(`btn-filter-${keyword === 'all' ? 'all' : keyword}`);
            if (activeBtn) {
                activeBtn.className = "px-3 py-1.5 text-xs font-semibold rounded-lg bg-pirate-cyan text-slate-950 transition-colors cursor-pointer";
            }

            renderTweets();
        }

        function renderTweets() {
            const container = document.getElementById('tweets-container');
            container.innerHTML = '';

            const filtered = activeFilter === 'all' 
                ? allTweets 
                : allTweets.filter(t => t.matched_keyword === activeFilter);

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-slate-500 text-sm">
                        Zatím žádné zmínky.
                    </div>
                `;
                return;
            }

            const twentyFourHoursAgo = new Date(new Date().getTime() - (24 * 60 * 60 * 1000));

            filtered.forEach((tweet, index) => {
                const isNew = new Date(tweet.timestamp) >= twentyFourHoursAgo;
                const tweetUrl = `https://x.com/${tweet.author}/status/${tweet.id}`;
                const copyBtnId = `copy-btn-${index}`;

                const item = document.createElement('div');
                item.className = "bg-pirate-card/40 hover:bg-pirate-card/80 border border-slate-800/80 hover:border-slate-700/80 p-4 rounded-lg transition-all flex flex-col md:flex-row justify-between items-start md:items-center gap-4";

                item.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                            ${isNew ? `
                                <span class="inline-flex items-center gap-1 text-[10px] bg-emerald-500/10 text-emerald-400 font-bold px-1.5 py-0.5 rounded border border-emerald-500/20">
                                    <span class="h-1 w-1 rounded-full bg-emerald-400"></span> NOVÉ
                                </span>
                            ` : ''}
                            
                            <a href="https://x.com/${tweet.author}" target="_blank" class="font-bold text-white hover:underline text-sm">
                                @${tweet.author}
                            </a>
                            
                            <span class="text-slate-500 text-xs">•</span>
                            
                            <span class="text-slate-400 text-xs">
                                ${getRelativeTime(tweet.timestamp)}
                            </span>

                            ${tweet.matched_keyword ? `
                                <span class="text-[9px] bg-slate-900 text-pirate-yellow font-mono px-1.5 py-0.5 rounded border border-slate-800/60 ml-auto md:ml-2">
                                    ${tweet.matched_keyword}
                                </span>
                            ` : ''}
                        </div>
                        
                        <p class="text-slate-200 text-sm leading-relaxed whitespace-pre-line break-words">
                            ${tweet.text}
                        </p>
                    </div>

                    <div class="flex items-center gap-2 w-full md:w-auto justify-end border-t border-slate-800/40 md:border-t-0 pt-3 md:pt-0 shrink-0">
                        <button id="${copyBtnId}" onclick="copyToClipboard('${tweetUrl}', '${copyBtnId}')" 
                                class="px-3 py-1.5 text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 font-medium rounded-md transition-colors cursor-pointer">
                            🔗 Kopírovat odkaz
                        </button>
                        <a href="${tweetUrl}" target="_blank" 
                           class="px-3 py-1.5 text-xs bg-pirate-cyan hover:bg-cyan-500 text-slate-950 font-bold rounded-md transition-colors shadow-sm cursor-pointer inline-flex items-center gap-1">
                            💬 Odpovědět
                        </a>
                    </div>
                `;

                container.appendChild(item);
            });
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
