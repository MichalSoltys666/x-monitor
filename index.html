<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Monitor Dashboard</title>
    <style>
        /* Tmavý režim a celkový styl */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #15202b; /* Tmavě modro-černé pozadí */
            color: #ffffff; /* Bílý text */
            margin: 0;
            padding: 20px;
        }
        .header {
            max-width: 800px;
            margin: 0 auto 30px;
            text-align: center;
        }
        h1 {
            color: #e7e9ea;
        }
        /* Styl pro počítadlo */
        .stats {
            background-color: #1e2732;
            padding: 15px 30px;
            border-radius: 15px;
            display: inline-block;
            border: 1px solid #38444d;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #counter {
            font-size: 32px;
            font-weight: bold;
            color: #1da1f2; /* Modrá z X */
            display: block;
            margin-top: 5px;
        }
        .tweet-container {
            max-width: 800px;
            margin: 0 auto;
        }
        /* Styl pro samotné tweety */
        .tweet {
            background-color: #1e2732;
            border: 1px solid #38444d;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            transition: background-color 0.2s;
        }
        .tweet:hover {
            background-color: #22303c;
        }
        .tweet-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 15px;
            color: #8899a6;
        }
        .tweet-author {
            font-weight: bold;
            color: #e7e9ea;
            text-decoration: none;
        }
        .tweet-text {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }
        .tweet-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #8899a6;
            border-top: 1px solid #38444d;
            padding-top: 15px;
        }
        .keyword-tag {
            background-color: rgba(29, 161, 242, 0.1);
            color: #1da1f2;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid rgba(29, 161, 242, 0.3);
        }
        a {
            color: #1da1f2;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🚨 X-Monitor Dashboard</h1>
    <div class="stats">
        Celkový počet zachycených zmínek
        <span id="counter">0</span>
    </div>
</div>

<div class="tweet-container" id="tweets">
    <p style="text-align:center; color: #8899a6;">Načítám data z robota...</p>
</div>

<script>
    // Funkce pro hezký formát času
    function formatTime(isoString) {
        const date = new Date(isoString);
        return date.toLocaleString('cs-CZ');
    }

    // Načtení dat a oprava počítadla
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('tweets');
            const counter = document.getElementById('counter');
            
            // TADY SE NASTAVUJE POČÍTADLO podle počtu záznamů v JSONu
            counter.innerText = data.length;
            
            container.innerHTML = ''; // Smaže text "Načítám data..."

            if (data.length === 0) {
                container.innerHTML = '<p style="text-align:center; color: #8899a6;">Zatím nebyly nalezeny žádné tweety.</p>';
                return;
            }

            // Vykreslení každého tweetu jako karty
            data.forEach(tweet => {
                const tweetDiv = document.createElement('div');
                tweetDiv.className = 'tweet';
                
                // Zabráníme spouštění nebezpečného kódu z textu tweetu (XSS)
                const safeText = tweet.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                
                tweetDiv.innerHTML = `
                    <div class="tweet-header">
                        <a href="https://x.com/${tweet.author}" target="_blank" class="tweet-author">@${tweet.author}</a>
                        <span>${formatTime(tweet.timestamp)}</span>
                    </div>
                    <div class="tweet-text">
                        ${safeText}
                    </div>
                    <div class="tweet-footer">
                        <span class="keyword-tag">${tweet.matched_keyword}</span>
                        <a href="https://x.com/${tweet.author}/status/${tweet.id}" target="_blank">Otevřít na X ↗</a>
                    </div>
                `;
                container.appendChild(tweetDiv);
            });
        })
        .catch(error => {
            document.getElementById('tweets').innerHTML = '<p style="text-align:center; color: #f4212e;">Chyba při načítání dat. Zkus chvíli počkat nebo zkontroluj data.json.</p>';
            console.error('Chyba:', error);
        });
</script>

</body>
</html>
